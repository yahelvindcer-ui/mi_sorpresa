<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
    overflow-x:hidden;
}

/* 💖 corazones flotando */
.corazon{
    position:fixed;
    top:-10px;
    color:#ff4d6d;
    animation: caer linear infinite;
}
@keyframes caer{
    to{
        transform: translateY(110vh);
    }
}

/* contenedor */
.container{
    padding:30px;
}

h1{
    font-size:55px;
}

p{
    font-size:22px;
    max-width:700px;
    margin:auto;
}

/* botón música */
button{
    background:#ff4d6d;
    border:none;
    padding:15px 25px;
    font-size:20px;
    color:white;
    border-radius:30px;
    cursor:pointer;
    margin:20px;
}
button:hover{
    background:#ff1e4d;
}

/* 📸 galería */
.foto{
    width:260px;
    border-radius:20px;
    margin:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

/* 💌 carta */
.carta{
    width:300px;
    height:200px;
    margin:40px auto;
    perspective:1000px;
}
.sobre{
    width:100%;
    height:100%;
    background:#ff4d6d;
    position:relative;
    transform-style:preserve-3d;
    transition:1s;
    cursor:pointer;
}
.sobre.abierto{
    transform:rotateX(180deg);
}
.mensaje{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    color:#ff4d6d;
    transform:rotateX(180deg);
    padding:20px;
    box-sizing:border-box;
    font-size:20px;
}

/* 🎁 sorpresa */
.sorpresa{
    display:none;
    font-size:30px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- 💖 corazones -->
<script>
setInterval(()=>{
    const corazon=document.createElement("div");
    corazon.className="corazon";
    corazon.innerHTML="💖";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.fontSize=(Math.random()*20+20)+"px";
    corazon.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(corazon);
    setTimeout(()=>corazon.remove(),6000);
},300);
</script>

<div class="container">

<h1>Para el amor de mi vida 💕</h1>

<p>
Eres mi lugar favorito, mi paz y mi felicidad.
Esta pequeña página es solo una muestra de lo mucho que te amo.
</p>

<!-- 🎵 música -->
<button onclick="document.getElementById('musica').play()">🎵 Nuestra canción</button>
<audio id="musica" loop>
    <source src="music/cancion.mp3" type="audio/mp3">
</audio>

<!-- 📸 fotos -->
<div>
    <img src="img/foto1.jpg" class="foto">
    <img src="img/foto2.jpg" class="foto">
</div>

<!-- 💌 carta animada -->
<h2>💌 Toca la carta</h2>
<div class="carta" onclick="abrirCarta()">
    <div class="sobre" id="sobre">
        <div class="mensaje">
            Gracias por existir ❤️<br><br>
            Prometo cuidarte, apoyarte  
            y amarte todos los días de mi vida.
        </div>
    </div>
</div>

<!-- 🎁 botón sorpresa -->
<button onclick="mostrarSorpresa()">🎁 No presiones aquí</button>
<div class="sorpresa" id="sorpresa">
    💖 ¡Sorpresa! 💖<br>
    Quiero pasar toda mi vida contigo 🥺❤️
</div>

</div>

<script>
function abrirCarta(){
    document.getElementById("sobre").classList.toggle("abierto");
}

function mostrarSorpresa(){
    document.getElementById("sorpresa").style.display="block";
}
</script>

</body>
</html>
